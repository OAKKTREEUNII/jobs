name: Update jobs.json

# Runs every 6 hours (and on manual click). Pulls Adzuna -> writes jobs.json -> mirrors to Notion.
on:
  schedule:
    - cron: "0 */6 * * *"   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # needed to commit jobs.json back to the repo

concurrency:
  group: update-jobs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull jobs and write jobs.json
        env:
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:     ${{ secrets.ADZUNA_APP_KEY }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node fetch-jobs.js

      - name: Commit updated jobs.json
        run: |
          git config user.name  "oaktree-bot"
          git config user.email "actions@users.noreply.github.com"
          git add jobs.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh jobs.json [skip ci]"
            git push
          fi
